<script>
// ── 상태 ──
let db = [];
let formFront = null, formBack = null;
let editId = null;
let pendingBarcode = null;
let videoStream = null, scanTimer = null;

const ALLERGIES = ['밀','우유','계란','대두','땅콩','견과류','게','새우','오징어','조개류','복숭아','토마토','아황산류','돼지고기','쇠고기','닭고기'];
let selectedAllergies = [];

async function saveDB(item) {
  try {
    const col = firestoreDB.collection('ingredients');
    if (item._docId) {
      const docId = item._docId;
      const {_docId, ...data} = item;
      await col.doc(docId).update(data);
    } else {
      await col.add(item);
    }
  } catch(e) { console.error('Firestore save error:', e); toast('❌ 저장 실패: ' + e.message); }
}
async function deleteFromDB(docId) {
  try {
    await firestoreDB.collection('ingredients').doc(docId).delete();
  } catch(e) { console.error('Firestore delete error:', e); }
}
function initFirestoreSync() {
  firestoreDB.collection('ingredients').onSnapshot((snapshot) => {
    db = snapshot.docs.map(d => ({ ...d.data(), _docId: d.id }));
    if (typeof firestoreDB !== 'undefined') initFirestoreSync();
renderItems();
    document.getElementById('countBadge').textContent = db.length;
  }, (err) => { console.error('Firestore sync error:', err); });
}

// ── 알레르기 렌더 ──
function renderAllergyGrid() {
  const grid = document.getElementById('allergyGrid');
  grid.innerHTML = ALLERGIES.map(a =>
    `<div class="allergy-chip ${selectedAllergies.includes(a)?'active':''}" onclick="toggleAllergy('${a}')">${a}</div>`
  ).join('');
}

function toggleAllergy(a) {
  if (selectedAllergies.includes(a)) {
    selectedAllergies = selectedAllergies.filter(x => x !== a);
  } else {
    selectedAllergies.push(a);
  }
  renderAllergyGrid();
}

// ── 스캐너 ──
function openScanner() {
  closeForm();
  document.getElementById('scannerPanel').classList.add('active');
  const status = document.getElementById('scanStatus');
  const manualRow = document.getElementById('manualBcRow');

  if (!('BarcodeDetector' in window)) {
    status.textContent = '자동 스캔 미지원 — 번호를 직접 입력해주세요';
    manualRow.classList.add('show');
    return;
  }

  navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } } })
    .then(stream => {
      videoStream = stream;
      const video = document.getElementById('video');
      video.srcObject = stream;
      status.textContent = '바코드를 카메라에 비춰주세요...';
      const detector = new BarcodeDetector({ formats: ['ean_13','ean_8','code_128','code_39','upc_a','upc_e'] });
      scanTimer = setInterval(async () => {
        if (video.readyState < 2) return;
        try {
          const results = await detector.detect(video);
          if (results.length > 0) {
            stopCamera(); closeScanner();
            processBarcode(results[0].rawValue);
          }
        } catch(e) {}
      }, 400);
    })
    .catch(() => {
      status.textContent = '카메라 접근 실패 — 번호를 직접 입력해주세요';
      manualRow.classList.add('show');
    });
}

function stopCamera() {
  if (scanTimer) { clearInterval(scanTimer); scanTimer = null; }
  if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
}

function closeScanner() {
  stopCamera();
  document.getElementById('scannerPanel').classList.remove('active');
  document.getElementById('manualBcRow').classList.remove('show');
  document.getElementById('manualBcInput').value = '';
}

function processManualBarcode() {
  const val = document.getElementById('manualBcInput').value.trim();
  if (!val) return;
  closeScanner();
  processBarcode(val);
}

function processBarcode(barcode) {
  const existing = db.find(d => d.barcode === barcode);
  if (existing) {
    toast('⚠️ 이미 등록된 바코드예요');
    return;
  }
  openForm();
  document.getElementById('fBarcode').value = barcode;
  document.getElementById('formTitle').textContent = '원료 등록 (' + barcode + ')';
}

// ── 폼 ──
function resetForm() {
  editId = null;
  pendingBarcode = null;
  formFront = null;
  formBack = null;
  selectedAllergies = [];
  ['fBarcode','fName','fType','fOrigin','fSpec','fMaker','fSupplier','fIngredients'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('fStorage').value = '';
  document.getElementById('prevFront').style.display = 'none';
  document.getElementById('prevBack').style.display = 'none';
  document.getElementById('aiResult').classList.remove('show');
  document.getElementById('aiLoading').classList.remove('show');
  document.getElementById('formTitle').textContent = '원료 등록';
  renderAllergyGrid();
}

function openForm(item) {
  closeScanner();
  resetForm();
  if (item) {
    editId = item.id;
    document.getElementById('formTitle').textContent = '원료 수정';
    document.getElementById('fBarcode').value = item.barcode || '';
    document.getElementById('fName').value = item.name || '';
    document.getElementById('fType').value = item.type || '';
    document.getElementById('fOrigin').value = item.origin || '';
    document.getElementById('fStorage').value = item.storage || '';
    document.getElementById('fSpec').value = item.spec || '';
    document.getElementById('fMaker').value = item.maker || '';
    document.getElementById('fSupplier').value = item.supplier || '';
    document.getElementById('fIngredients').value = item.ingredients || '';
    selectedAllergies = item.allergies ? [...item.allergies] : [];
    formFront = item.photoFront || null;
    formBack = item.photoBack || null;
    if (formFront) { document.getElementById('prevFront').src = formFront; document.getElementById('prevFront').style.display = 'block'; }
    if (formBack) { document.getElementById('prevBack').src = formBack; document.getElementById('prevBack').style.display = 'block'; }
    renderAllergyGrid();
  }
  document.getElementById('formPanel').classList.add('active');
  document.getElementById('formPanel').scrollIntoView({ behavior: 'smooth' });
}

function closeForm() {
  document.getElementById('formPanel').classList.remove('active');
}

function handlePhoto(side, e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const maxSize = 1000;
      let w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
        else { w = Math.round(w * maxSize / h); h = maxSize; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL('image/jpeg', 0.7);
      if (side === 'front') {
        formFront = compressed;
        document.getElementById('prevFront').src = compressed;
        document.getElementById('prevFront').style.display = 'block';
      } else {
        formBack = compressed;
        document.getElementById('prevBack').src = compressed;
        document.getElementById('prevBack').style.display = 'block';
      }
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ── AI 추출 ──
async function extractWithAI() {
  if (!formBack) {
    toast('⚠️ 후면 사진을 먼저 촬영해주세요');
    return;
  }

  document.getElementById('aiLoading').classList.add('show');
  document.getElementById('aiResult').classList.remove('show');

  try {
    const base64 = formBack.split(',')[1];
    const mediaType = formBack.split(';')[0].split(':')[1];

    const response = await fetch('https://anthropic-proxy.dhfl0303.workers.dev', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: mediaType, data: base64 }
            },
            {
              type: 'text',
              text: '이 제품 후면 사진에서 원재료명과 알레르기 정보를 추출하세요. 반드시 아래 JSON 형식으로만 답하세요. 다른 말은 절대 하지 마세요:\n{"ingredients": "원재료명 전체", "allergies": ["알레르기1"]}\n알레르기는 다음 중에서만 선택: 밀, 우유, 계란, 대두, 땅콩, 견과류, 게, 새우, 오징어, 조개류, 복숭아, 토마토, 아황산류, 돼지고기, 쇠고기, 닭고기\n사진이 흐리거나 읽기 어려워도 최대한 읽어서 JSON으로만 답하세요.'
            }
          ]
        }]
      })
    });

    const data = await response.json();
    const text = data.content[0].text.trim();
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    document.getElementById('fIngredients').value = parsed.ingredients || '';
    selectedAllergies = parsed.allergies || [];
    renderAllergyGrid();

    document.getElementById('aiResultText').textContent = '원재료: ' + (parsed.ingredients || '-');
    document.getElementById('aiResult').classList.add('show');
    toast('✅ AI 추출 완료! 확인 후 저장해주세요');
  } catch(e) {
    toast('❌ AI 추출 실패 — 직접 입력해주세요');
  } finally {
    document.getElementById('aiLoading').classList.remove('show');
  }
}

// ── 저장 ──
function submitForm() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { alert('품명을 입력해주세요.'); return; }

  const item = {
    id: editId || Date.now(),
    barcode: document.getElementById('fBarcode').value.trim(),
    name,
    type: document.getElementById('fType').value.trim(),
    origin: document.getElementById('fOrigin').value.trim(),
    storage: document.getElementById('fStorage').value,
    spec: document.getElementById('fSpec').value.trim(),
    maker: document.getElementById('fMaker').value.trim(),
    supplier: document.getElementById('fSupplier').value.trim(),
    ingredients: document.getElementById('fIngredients').value.trim(),
    allergies: [...selectedAllergies],
    photoFront: formFront,
    photoBack: formBack,
    updatedAt: new Date().toISOString()
  };

  saveDB(item);
  closeForm();
  toast(editId ? '✅ 수정됐어요' : '✅ 등록됐어요');
}

// ── 삭제 ──
function deleteItem(id) {
  if (!confirm('삭제할까요?')) return;
  const item = db.find(d => d.id === id);
  if (item && item._docId) deleteFromDB(item._docId);
  toast('🗑 삭제됐어요');
}

// ── 렌더 ──
function renderItems() {
  const empty = document.getElementById('emptyMsg');
  const list = document.getElementById('itemsList');
  const search = document.getElementById('searchInput').value.trim().toLowerCase();

  const filtered = db.filter(d =>
    !search ||
    (d.name && d.name.toLowerCase().includes(search)) ||
    (d.barcode && d.barcode.includes(search))
  );

  document.getElementById('countBadge').textContent = db.length;

  if (!filtered.length) {
    empty.style.display = 'block';
    list.innerHTML = '';
    return;
  }
  empty.style.display = 'none';

  list.innerHTML = filtered.map(item => `
    <div class="item-card">
      <button class="item-card-del" onclick="deleteItem(${item.id})">×</button>
      <div class="item-header">
        <div>
          <div class="item-name">${item.name}</div>
          <div class="item-sub">${item.type||''} ${item.origin ? '· '+item.origin : ''}</div>
          ${item.barcode ? `<div class="item-barcode">${item.barcode}</div>` : ''}
        </div>
        <button class="btn btn-outline btn-sm" onclick='openForm(${JSON.stringify(item)})'>수정</button>
      </div>

      <div class="item-badges">
        ${item.storage ? `<span class="badge badge-blue">${item.storage}</span>` : ''}
        ${item.spec ? `<span class="badge badge-gray">${item.spec}</span>` : ''}
        ${item.maker ? `<span class="badge badge-green">${item.maker}</span>` : ''}
        ${item.supplier ? `<span class="badge badge-orange">${item.supplier}</span>` : ''}
      </div>

      ${item.ingredients ? `
        <div class="item-section">
          <div class="item-section-title">원재료명</div>
          <div class="item-section-body">${item.ingredients}</div>
        </div>` : ''}

      ${item.allergies && item.allergies.length ? `
        <div class="item-section">
          <div class="item-section-title">알레르기</div>
          <div style="display:flex;flex-wrap:wrap;gap:4px">
            ${item.allergies.map(a => `<span class="badge badge-red">${a}</span>`).join('')}
          </div>
        </div>` : ''}

      ${(item.photoFront || item.photoBack) ? `
        <div class="item-photos">
          ${item.photoFront ? `<img class="item-photo" src="${item.photoFront}" onclick="openImgModal('${item.photoFront}')">` : ''}
          ${item.photoBack ? `<img class="item-photo" src="${item.photoBack}" onclick="openImgModal('${item.photoBack}')">` : ''}
        </div>` : ''}
    </div>
  `).join('');
}

// ── 이미지 모달 ──
function openImgModal(src) {
  document.getElementById('modalImg').src = src;
  document.getElementById('imgModal').classList.add('active');
}
function closeImgModal() { document.getElementById('imgModal').classList.remove('active'); }

// ── 토스트 ──
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

renderItems();
</script>
